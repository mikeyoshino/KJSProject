# deploy/nginx/rg-proxy.conf
# Copy to /etc/nginx/sites-available/ and symlink to sites-enabled/

server {
    listen 443 ssl;
    server_name dl.yoursite.com;

    ssl_certificate     /etc/letsencrypt/live/dl.yoursite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dl.yoursite.com/privkey.pem;

    client_max_body_size 600M;

    # Internal-only file serving — only accessible via X-Accel-Redirect from ASP.NET Core
    # Users CANNOT browse this location directly (returns 404)
    location /internal-cache/ {
        internal;
        alias /var/cache/rg-downloads/;
    }

    # All API calls forwarded to Kestrel
    location /api/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for Rapidgator downloads
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name dl.yoursite.com;
    return 301 https://$host$request_uri;
}
