name = "b2-download-gatekeeper"
main = "src/index.js"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

[vars]
B2_ENDPOINT = "https://s3.us-east-005.backblazeb2.com"
B2_REGION = "us-east-005"
B2_BUCKET = "KJSProject"
JWT_SECRET = "CHANGE_ME_TO_A_SECURE_RANDOM_STRING_SHARED_WITH_KJSWEB"

# Use Wrangler secrets to securely store B2 credentials:
# npx wrangler secret put B2_APPLICATION_KEY_ID
# npx wrangler secret put B2_APPLICATION_KEY
