name: Deploy KJSWeb

on:
  push:
    branches: [master]
    paths:
      - 'KJSWeb/**'
      - '.github/workflows/deploy-kjsweb.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/KJSProject
            git pull origin master
            docker build -t kjsweb:latest -f KJSWeb/Dockerfile KJSWeb/
            docker stop kjsweb || true
            docker rm kjsweb || true
            docker run -d \
              --name kjsweb \
              --env-file /opt/kjsweb/.env \
              -p 5100:5100 \
              --restart unless-stopped \
              kjsweb:latest
            sleep 3
            curl -sf http://localhost:5100 > /dev/null && echo "Health check passed" || echo "Health check FAILED"
